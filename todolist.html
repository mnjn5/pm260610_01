<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #6c63ff;
    }

    .input-area button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #574fd6;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 6px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      border-color: #6c63ff;
      background: #6c63ff;
      color: #fff;
    }

    .todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-all;
      outline: none;
      border: none;
      background: transparent;
      cursor: text;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e74c3c;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <div class="input-area">
      <input type="text" id="newTodo" placeholder="할 일을 입력하세요..." maxlength="100">
      <button id="addBtn" title="추가">+</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">진행중</button>
      <button data-filter="done">완료</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="countText">0개 남음</span>
      <button class="clear-btn" id="clearDone">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'todos';
    let filter = 'all';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function render() {
      const todos = load();
      const list = document.getElementById('todoList');
      const active = todos.filter(t => !t.done);

      document.getElementById('countText').textContent = `${active.length}개 남음`;

      const visible = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">항목이 없습니다</li>';
        return;
      }

      list.innerHTML = '';
      visible.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = todo.done;
        cb.addEventListener('change', () => toggle(todo.id));

        const span = document.createElement('span');
        span.className = 'todo-text' + (todo.done ? ' done' : '');
        span.textContent = todo.text;
        span.contentEditable = true;
        span.spellcheck = false;
        span.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
        });
        span.addEventListener('blur', () => {
          const text = span.textContent.trim();
          if (text) edit(todo.id, text);
          else span.textContent = todo.text;
        });

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.title = '삭제';
        del.addEventListener('click', () => remove(todo.id));

        li.append(cb, span, del);
        list.appendChild(li);
      });
    }

    function addTodo() {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (!text) return;
      const todos = load();
      todos.push({ id: Date.now(), text, done: false });
      save(todos);
      input.value = '';
      render();
    }

    function toggle(id) {
      const todos = load().map(t => t.id === id ? { ...t, done: !t.done } : t);
      save(todos);
      render();
    }

    function remove(id) {
      save(load().filter(t => t.id !== id));
      render();
    }

    function edit(id, text) {
      const todos = load().map(t => t.id === id ? { ...t, text } : t);
      save(todos);
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addTodo);
    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clearDone').addEventListener('click', () => {
      save(load().filter(t => !t.done));
      render();
    });

    render();
  </script>
</body>
</html>
